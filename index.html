<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待ち時間 管理パネル</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3347;
      --accent:    #4f7dff;
      --accent-dim:#1e2d5a;
      --success:   #22c55e;
      --danger:    #ef4444;
      --text:      #e8eaf0;
      --muted:     #7a7f9a;
      --radius:    12px;
      --mono:      'JetBrains Mono', 'Fira Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }
    .card-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .card-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    /* ── Form ── */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    input.error-field { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(239,68,68,.2); }

    /* 自動計算フィールド */
    input[readonly] {
      background: var(--surface2);
      color: var(--accent);
      font-weight: 600;
      cursor: default;
      border-color: var(--accent-dim);
    }
    input[readonly]:focus {
      border-color: var(--accent-dim);
      box-shadow: none;
    }

    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface2); }
    .field { margin-bottom: 20px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:hover    { opacity: .88; }
    .btn-primary:active   { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }
    .toggle-label { font-size: 14px; font-weight: 600; }
    .toggle-desc  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background .25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .25s;
    }
    .switch input:checked + .slider { background: var(--success); }
    .switch input:checked + .slider::before { transform: translateX(20px); }

    /* ── 係数設定ボックス ── */
    .coefficient-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .coefficient-box-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 12px;
    }
    .coefficient-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .coefficient-row input {
      width: 90px;
      flex-shrink: 0;
      text-align: center;
    }
    .coefficient-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .coefficient-desc strong {
      color: var(--text);
    }

    /* ── Auto-calc hint ── */
    .field-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      font-family: var(--mono);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show    { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); }
    #toast.error   { border-color: var(--danger); }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
      font-family: var(--mono);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .status-dot.ok { background: var(--success); box-shadow: 0 0 5px var(--success); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    #login-screen, #admin-screen { display: none; }
    #login-screen.active, #admin-screen.active { display: block; }

    #last-updated {
      font-size: 12px; color: var(--muted);
      font-family: var(--mono); text-align: right; margin-top: 16px;
    }

    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%    { transform: translateX(-8px); }
      40%    { transform: translateX(8px); }
      60%    { transform: translateX(-5px); }
      80%    { transform: translateX(5px); }
    }
    .shake { animation: shake .4s ease; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    待ち時間 管理パネル
  </div>
  <button class="btn-ghost" id="logout-btn" style="display:none" onclick="logout()">ログアウト</button>
</header>

<main>
  <!-- ── LOGIN ── -->
  <div class="card" id="login-screen">
    <div class="card-title">管理者ログイン</div>
    <div class="card-sub">管理者パスワードを入力してください</div>
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="pw-input" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')login()" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="login()">ログイン</button>
  </div>

  <!-- ── ADMIN ── -->
  <div class="card" id="admin-screen">
    <div class="card-title">待ち時間を更新</div>
    <div class="card-sub">変更は即座にリアルタイム反映されます</div>

    <div class="status-bar">
      <span class="status-dot ok"></span>
      <span>Supabase 接続中</span>
    </div>

    <div class="field">
      <label>店舗</label>
      <select id="store-select" onchange="loadStoreData()">
        <option value="">-- 店舗を選択 --</option>
      </select>
    </div>

    <hr class="divider" />

    <!-- 係数設定 -->
    <div class="coefficient-box">
      <div class="coefficient-box-title">⚙ 待ち時間の計算係数</div>
      <div class="coefficient-row">
        <input type="number" id="coeff-input" min="0.1" max="60" step="0.5"
               value="3" oninput="onCoeffChange()" />
        <div class="coefficient-desc">
          分／人　→　<strong>待ち時間 = 待ち人数 × 係数（5分単位）</strong>
        </div>
      </div>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">営業中</div>
        <div class="toggle-desc" id="open-desc">現在 表示中（待ち情報あり）</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="is-open" checked onchange="toggleOpenState()" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row-2">
      <div class="field">
        <label>待ち人数</label>
        <input type="number" id="waiting-groups" min="0" max="999" placeholder="例: 5"
               oninput="calcWaitTime()" />
      </div>
      <div class="field">
        <label>待ち時間（分）</label>
        <input type="number" id="wait-minutes" readonly placeholder="自動計算" />
        <div class="field-hint">待ち人数 × 係数、5分単位</div>
      </div>
    </div>

    <div class="field">
      <label>お知らせ（任意）</label>
      <textarea id="notice" placeholder="例: 本日は混雑が予想されます。"></textarea>
    </div>

    <button class="btn-primary" id="save-btn" onclick="save()" disabled>保存する</button>
    <div id="last-updated"></div>
  </div>
</main>

<div id="toast">
  <span id="toast-icon">✓</span>
  <span id="toast-msg"></span>
</div>

<script>
  /* ═══════════════════════════════════════════════════
     ▶ CONFIG — ここを書き換えてください
  ═══════════════════════════════════════════════════ */
  const SUPABASE_URL      = 'https://fntwrdofozxbamjiawac.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_dTtCMCzwV53fqxBgXqVMfQ_G_rx0Mjw';

  const ADMIN_PASSWORD = '15';

  // ▼ デフォルトの係数（分／人）。管理パネルのUIからも変更できます。
  const DEFAULT_MINUTES_PER_PERSON = 1.5;
  /* ═══════════════════════════════════════════════════ */

  const SESSION_KEY = 'wt_admin_authed';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentStoreId = null;
  let isOpenState    = true;

  /* ── Boot ── */
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    showAdmin();
  } else {
    showLogin();
  }

  /* ─────────────────────────────────────────
     待ち時間の自動計算（5分単位四捨五入）
  ───────────────────────────────────────── */
  function calcWaitTime() {
    const people = parseInt(document.getElementById('waiting-groups').value);
    const coeff  = parseFloat(document.getElementById('coeff-input').value);
    const minutesEl = document.getElementById('wait-minutes');

    if (!isOpenState || isNaN(people) || people === 0) {
      minutesEl.value = '';
      return;
    }
    const raw     = people * coeff;           // 生の分数
    const rounded = Math.round(raw / 5) * 5;  // 5分単位四捨五入
    minutesEl.value = rounded;
  }

  function onCoeffChange() {
    calcWaitTime();
  }

  /* ─────────────────────────────────────────
     AUTH
  ───────────────────────────────────────── */
  function login() {
    const input = document.getElementById('pw-input');
    const btn   = document.getElementById('login-btn');

    if (input.value === ADMIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, '1');
      input.value = '';
      input.classList.remove('error-field');
      showAdmin();
    } else {
      input.classList.add('error-field', 'shake');
      input.value = '';
      setTimeout(() => input.classList.remove('shake'), 400);
      toast('パスワードが違います', 'error');
      btn.disabled = true;
      setTimeout(() => { btn.disabled = false; }, 1500);
    }
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    showLogin();
  }

  /* ─────────────────────────────────────────
     SCREEN SWITCH
  ───────────────────────────────────────── */
  function showLogin() {
    document.getElementById('login-screen').classList.add('active');
    document.getElementById('admin-screen').classList.remove('active');
    document.getElementById('logout-btn').style.display = 'none';
    setTimeout(() => document.getElementById('pw-input').focus(), 50);
  }

  async function showAdmin() {
    document.getElementById('login-screen').classList.remove('active');
    document.getElementById('admin-screen').classList.add('active');
    document.getElementById('logout-btn').style.display = '';
    // デフォルト係数をUIに反映
    document.getElementById('coeff-input').value = DEFAULT_MINUTES_PER_PERSON;
    await loadStores();
  }

  /* ─────────────────────────────────────────
     DATA
  ───────────────────────────────────────── */
  async function loadStores() {
    const { data, error } = await sb.from('stores').select('id, name').order('name');
    if (error) { toast('店舗の読み込みに失敗しました', 'error'); return; }

    const sel = document.getElementById('store-select');
    sel.innerHTML = '<option value="">-- 店舗を選択 --</option>';
    data.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });

    if (data.length === 1) {
      sel.value = data[0].id;
      await loadStoreData();
    }
  }

  async function loadStoreData() {
    const storeId = document.getElementById('store-select').value;
    if (!storeId) {
      currentStoreId = null;
      document.getElementById('save-btn').disabled = true;
      return;
    }
    currentStoreId = parseInt(storeId);

    const { data, error } = await sb
      .from('wait_times').select('*')
      .eq('store_id', storeId).maybeSingle();

    if (error) { toast('データ読み込みに失敗しました', 'error'); return; }

    if (data) {
      document.getElementById('waiting-groups').value = data.waiting_groups ?? '';
      document.getElementById('notice').value         = data.notice ?? '';
      isOpenState = data.wait_minutes !== null;
      document.getElementById('is-open').checked = isOpenState;
      updateOpenDesc();
      syncInputState();
      // 待ち時間は再計算（DBの値ではなく現在の係数で算出）
      calcWaitTime();
      if (data.updated_at) {
        document.getElementById('last-updated').textContent =
          '最終更新: ' + new Date(data.updated_at).toLocaleString('ja-JP');
      }
    } else {
      document.getElementById('waiting-groups').value = '';
      document.getElementById('wait-minutes').value   = '';
      document.getElementById('notice').value         = '';
      isOpenState = true;
      document.getElementById('is-open').checked = true;
      updateOpenDesc();
      syncInputState();
      document.getElementById('last-updated').textContent = '（データなし）';
    }
    document.getElementById('save-btn').disabled = false;
  }

  function toggleOpenState() {
    isOpenState = document.getElementById('is-open').checked;
    updateOpenDesc();
    syncInputState();
    calcWaitTime();
  }

  function updateOpenDesc() {
    document.getElementById('open-desc').textContent =
      isOpenState ? '現在 表示中（待ち情報あり）' : '現在 非表示（休業 / 情報なし）';
  }

  function syncInputState() {
    const g = document.getElementById('waiting-groups');
    const m = document.getElementById('wait-minutes');
    if (!isOpenState) { g.value = ''; m.value = ''; }
    g.disabled = !isOpenState;
    // wait-minutesはreadonlyなのでdisabledは不要（見た目は変わらないので任意）
  }

  async function save() {
    if (!currentStoreId) return;
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = '保存中...';

    const storeName = document.getElementById('store-select').selectedOptions[0]?.textContent ?? '';
    const groups    = document.getElementById('waiting-groups').value;
    const minutes   = document.getElementById('wait-minutes').value;
    const notice    = document.getElementById('notice').value.trim();

    const { error } = await sb.from('wait_times').upsert({
      store_id:       currentStoreId,
      store_name:     storeName,
      wait_minutes:   isOpenState && minutes !== '' ? parseInt(minutes) : null,
      waiting_groups: groups !== '' ? parseInt(groups) : 0,
      notice:         notice || null,
    }, { onConflict: 'store_id' });

    btn.disabled = false;
    btn.textContent = '保存する';

    if (error) {
      toast('保存に失敗しました: ' + error.message, 'error');
    } else {
      toast('保存しました ', 'success');
      document.getElementById('last-updated').textContent =
        '最終更新: ' + new Date().toLocaleString('ja-JP');
    }
  }

  /* ─────────────────────────────────────────
     TOAST
  ───────────────────────────────────────── */
  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    document.getElementById('toast-icon').textContent = type === 'success' ? '✓' : '✕';
    document.getElementById('toast-msg').textContent  = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }
</script>
</body>
</html>
